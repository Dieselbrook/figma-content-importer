    "Visual_Brief": "Dog frozen mid-moment with ears up and a hyper-alert expression. Natural home or garden setting. Quick, simple joke. Best breed options: Beagle, Border Collie, Staffy, Africanis, or mixed breed. Treats angle can be implied visually but keep it clean and not overly product-heavy.",
    "Other_Copy": "Can’t hear\n“come here”\nHears a packet\nopen instantly",
    "Size": "",
    "Figma_Frame": "",
    "Status": "approved",
    "Approved_By": "Deon",
    "Published_URL": "",
    "Figma_Status": "ready",
    "Image_URLs": ""
  }
];
    let jsonData = null;
    const DATA_URL = null; // Disabled — using inline data
    let enrichedData = null;

    const INLINE_DATA = typeof window.INLINE_DATA !== 'undefined' ? window.INLINE_DATA : null;

    const loadingEl = document.getElementById('loading');
    const preview = document.getElementById('preview');
    const importBtn = document.getElementById('import-btn');
    const successEl = document.getElementById('success');
    const errorEl = document.getElementById('error');
    const progressEl = document.getElementById('progress-msg');
    const warnEl = document.getElementById('warn-no-images');

    function parseDimensions(post) {
      // Use Size first, fallback to Dimensions
      const dimStr = (post.Size && post.Size.trim()) ? post.Size : post.Dimensions;
      if (!dimStr) return [{ label: 'Frame', width: 1080, height: 1080 }];
      const normalised = dimStr.replace(/(\d+)\s*x\s*(\d+)(?!px)/gi, '$1x$2px');
      const results = [];
      const orParts = normalised.split(/\s+or\s+/i);
      if (orParts.length > 1) {
        for (const part of orParts) {
          const m = part.match(/(\d+)\s*x\s*(\d+)\s*px/i);
          if (m) {
            const label = part.replace(/\d+\s*x\s*\d+\s*px/i, '').replace(/[()]/g, '').trim() || 'Frame';
            results.push({ label, width: parseInt(m[1]), height: parseInt(m[2]) });
          }
        }
        return results.length ? results : [{ label: 'Frame', width: 1080, height: 1080 }];
      }
      const parts = normalised.split('|');
      for (const part of parts) {
        const m = part.match(/(\d+)\s*x\s*(\d+)\s*px/i);
        if (m) {
          const label = part.replace(/\d+\s*x\s*\d+\s*px/i, '').replace(/:/g, '').trim() || 'Frame';
          results.push({ label, width: parseInt(m[1]), height: parseInt(m[2]) });
        }
      }
      return results.length ? results : [{ label: 'Frame', width: 1080, height: 1080 }];
    }

    function countCarouselSlides(visualBrief) {
      if (!visualBrief) return 0;
      const matches = visualBrief.match(/Slide\s+\d+/gi);
      return matches ? Math.max(...matches.map(m => parseInt(m.match(/\d+/)[0]))) : 0;
    }

    function countFrames(posts) {
      let total = 0;
      for (const post of posts) {
        const dims = parseDimensions(post);
        const isCarousel = (post.Content_Format || '').toLowerCase().includes('carousel');
        if (isCarousel) {
          const slides = countCarouselSlides(post.Visual_Brief);
          total += Math.max(slides, 1) * dims.length;
        } else {
          total += dims.length;
        }
      }
      return total;
    }

    // Fetch a single image URL and return base64 bytes as number[]
    function fetchImageBytes(url) {
      return new Promise((resolve) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'arraybuffer';
        xhr.onload = function() {
          if (xhr.status === 200) {
            resolve(Array.from(new Uint8Array(xhr.response)));
          } else {
            console.warn('Failed to fetch image:', url, xhr.status);
            resolve(null);
          }
        };
        xhr.onerror = function() {
          console.warn('Network error fetching image:', url);
          resolve(null);
        };
        xhr.timeout = 15000;
        xhr.ontimeout = function() {
          console.warn('Timeout fetching image:', url);
          resolve(null);
        };
        xhr.send();
      });
    }

    // Parse comma-separated Image_URLs, return array of URL strings
    function parseImageUrls(imageUrlsStr) {
      if (!imageUrlsStr || !imageUrlsStr.trim()) return [];
      return imageUrlsStr.split(',').map(u => u.trim()).filter(Boolean);
    }

    async function enrichWithImages(posts) {
      const total = posts.filter(p => p.Image_URLs).length;
      let done = 0;

      const enriched = [];
      for (const post of posts) {
        const urls = parseImageUrls(post.Image_URLs);
        if (urls.length === 0) {
          enriched.push({ ...post, _imageBytes: [] });
          continue;
        }

        progressEl.style.display = 'block';
        progressEl.textContent = `Downloading images... (${done + 1}/${total})`;

        const byteArrays = [];
        for (const url of urls) {
          const bytes = await fetchImageBytes(url);
          byteArrays.push(bytes);
        }

        enriched.push({ ...post, _imageBytes: byteArrays });
        done++;
      }

      progressEl.style.display = 'none';
      return enriched;
    }

    function loadData(posts) {
      loadingEl.style.display = 'none';
      if (!posts || posts.length === 0) {
        errorEl.style.display = 'block';
        document.getElementById('error-msg').textContent = 'No approved + ready posts found. Run: node scripts/sync-sheet.js && npm run build';
        return;
      }

      jsonData = posts;
      const withImages = posts.filter(p => p.Image_URLs && p.Image_URLs.trim());
      const withCopy = posts.filter(p => p.Other_Copy && p.Other_Copy.trim());
      const imageCount = withImages.length;

      document.getElementById('post-count').textContent = posts.length;
      document.getElementById('frame-count').textContent = countFrames(posts);
      document.getElementById('image-count').textContent = `${imageCount}/${posts.length}`;
      document.getElementById('copy-count').textContent = `${withCopy.length}/${posts.length}`;
      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
      preview.style.display = 'block';

      if (imageCount === 0) {
        warnEl.style.display = 'block';
      } else {
        warnEl.style.display = 'none';
      }

      importBtn.disabled = false;
    }

    function fetchLatest() {
      jsonData = null;
      enrichedData = null;
      importBtn.disabled = true;
      successEl.style.display = 'none';
      errorEl.style.display = 'none';
      warnEl.style.display = 'none';
      progressEl.style.display = 'none';
      loadingEl.style.display = 'block';
      preview.style.display = 'none';

      if (INLINE_DATA && Array.isArray(INLINE_DATA) && INLINE_DATA.length > 0) {
        loadData(INLINE_DATA);
        return;
      }

      if (DATA_URL) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', DATA_URL + '?t=' + Date.now(), true);
        xhr.onload = function() {
          if (xhr.status === 200) {
            try {
              const parsed = JSON.parse(xhr.responseText);
              const posts = Array.isArray(parsed) ? parsed : (parsed.posts || []);
              loadData(posts);
            } catch (err) {
              loadingEl.style.display = 'none';
              errorEl.style.display = 'block';
              document.getElementById('error-msg').textContent = 'Invalid JSON: ' + err.message;
            }
          } else {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            document.getElementById('error-msg').textContent = 'No data. Run: node scripts/sync-sheet.js && npm run build';
          }
        };
        xhr.onerror = function() {
          loadingEl.style.display = 'none';
          errorEl.style.display = 'block';
          document.getElementById('error-msg').textContent = 'No data. Run: node scripts/sync-sheet.js && npm run build';
        };
        xhr.send();
      } else {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        document.getElementById('error-msg').textContent = 'No data. Run: node scripts/sync-sheet.js && npm run build';
      }
    }

    document.getElementById('refresh-link').addEventListener('click', fetchLatest);

    importBtn.addEventListener('click', async () => {
      if (!jsonData) return;
      importBtn.disabled = true;
      importBtn.textContent = 'Preparing images...';
      successEl.style.display = 'none';
      errorEl.style.display = 'none';

      try {
        // Fetch all images before sending to plugin
        enrichedData = await enrichWithImages(jsonData);
        importBtn.textContent = 'Importing to Figma...';
        parent.postMessage({ pluginMessage: { type: 'import', data: enrichedData } }, '*');
      } catch (err) {
        importBtn.disabled = false;
        importBtn.textContent = 'Import to Figma';
        errorEl.style.display = 'block';
        document.getElementById('error-msg').textContent = err.message || 'Image fetch failed';
      }
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'success') {
        successEl.style.display = 'block';
        document.getElementById('success-msg').textContent = msg.message;
        importBtn.textContent = 'Import to Figma';
        importBtn.disabled = false;
      } else if (msg.type === 'error') {
        errorEl.style.display = 'block';
        document.getElementById('error-msg').textContent = msg.message;
        importBtn.textContent = 'Import to Figma';
        importBtn.disabled = false;
      }
    };

    fetchLatest();
  </script>
</body>
</html>
